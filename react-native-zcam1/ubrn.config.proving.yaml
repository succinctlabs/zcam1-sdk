name: Zcam1Proving
rust:
  directory: ./..
  manifestPath: crates/proving-bindings/Cargo.toml
turboModule:
  cpp: cpp/proving
  ts: src/proving
  entrypoint: src/proving/bindings.tsx
bindings:
  cpp: cpp/proving/generated
ios:
  directory: ios/proving
  frameworkName: Zcam1ProvingFramework
  cargoExtras:
    - "--config"
    - "target.aarch64-apple-ios.rustflags=[\"-C\",\"link-arg=-target\",\"-C\",\"link-arg=arm64-apple-ios16.0\"]"
    - "--config"
    - "target.aarch64-apple-ios-sim.rustflags=[\"-C\",\"link-arg=-target\",\"-C\",\"link-arg=arm64-apple-ios16.0-simulator\"]"
noOverwrite:
  - "Zcam1Proving.podspec"
  - "src/proving/bindings.tsx"
  - "src/proving/NativeZcam1Proving.ts"
