name: Release zcam1-verify

on:
  push:
    tags:
      - "zcam1-verify-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108 --locked

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate version
        run: |
          VERSION=${GITHUB_REF#refs/tags/zcam1-verify-v}
          PKG_VERSION=$(node -p "require('./zcam1-verify/package.json').version")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish zcam1-verify
        run: |
          cd zcam1-verify
          npm ci
          TAG=$(node -p "const v=require('./package.json').version; v.includes('-') ? v.split('-')[1].split('.')[0] : 'latest'")
          npm publish --access public --provenance --tag $TAG
