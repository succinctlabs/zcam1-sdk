name: Release ZCAM1 SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the release (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Set up Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.4

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: "Install protoc"
        run: |
          brew install protobuf

      - name: "Install sp1up"
        run: |
          curl -L https://sp1.succinct.xyz | bash
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: "Install SP1 toolchain"
        run: |
          sp1up --token ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Check npm auth
        run: |
          cd react-native-zcam1 && npm publish --dry-run --ignore-scripts --access public --provenance
          cd ../zcam1-verify && npm publish --dry-run --ignore-scripts --access public --provenance

      - name: Create tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Publish zcam1-verify
        run: |
          cd zcam1-verify
          npm ci
          npm publish --access public --provenance

      - name: Publish react-native-zcam1
        run: |
          cd react-native-zcam1
          npm ci
          npm publish --access public --provenance
          zip -r Zcam1Framework.xcframework.zip Zcam1Framework.xcframework
          zip -r Zcam1ProvingFramework.xcframework.zip Zcam1ProvingFramework.xcframework

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: ZCAM1 SDK v${{ github.event.inputs.version }}
          files: |
            react-native-zcam1/Zcam1Framework.xcframework.zip
            react-native-zcam1/Zcam1ProvingFramework.xcframework.zip
