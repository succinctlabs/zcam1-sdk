name: Release react-native-zcam1

on:
  push:
    tags:
      - "react-native-zcam1-v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: macos-15

    steps:
      - name: Set up Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 16.4

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-apple-ios
            aarch64-apple-ios-sim
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Install ndk
        run: cargo install cargo-ndk

      - name: Install protoc
        run: brew install protobuf

      - name: Install sp1up
        run: |
          curl -L https://sp1.succinct.xyz | bash
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: Install SP1 toolchain
        run: sp1up --token ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate version
        run: |
          VERSION=${GITHUB_REF#refs/tags/react-native-zcam1-v}
          PKG_VERSION=$(node -p "require('./react-native-zcam1/package.json').version")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish react-native-zcam1
        run: |
          cd react-native-zcam1
          npm ci
          TAG=$(node -p "const v=require('./package.json').version; v.includes('-') ? v.split('-')[1].split('.')[0] : 'latest'")
          npm publish --access public --provenance --tag $TAG
          zip -r Zcam1Framework.xcframework.zip Zcam1Framework.xcframework
          zip -r Zcam1ProvingFramework.xcframework.zip Zcam1ProvingFramework.xcframework
          zip -r Zcam1Jni.zip Zcam1Jni
          zip -r Zcam1ProvingJni.zip Zcam1ProvingJni

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: react-native-zcam1 ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
          files: |
            react-native-zcam1/Zcam1Framework.xcframework.zip
            react-native-zcam1/Zcam1ProvingFramework.xcframework.zip
            react-native-zcam1/Zcam1Jni.zip
            react-native-zcam1/Zcam1ProvingJni.zip
