[package]
name = "zcam1-proving-utils"
version = "0.1.0"
edition = "2024"

[dependencies]
zcam1-ios = {workspace = true, features = ["proving"] }
serde.workspace = true
sp1-sdk.workspace = true
thiserror.workspace = true
uniffi.workspace = true

alloy-primitives = { version = "1.5.2", features = ["getrandom"] }
